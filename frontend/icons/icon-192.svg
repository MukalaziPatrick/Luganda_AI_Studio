<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <!-- Background -->
  <rect width="192" height="192" rx="38" fill="#0d1f14"/>
  <!-- Outer drum ring -->
  <circle cx="96" cy="96" r="72" fill="none" stroke="#1c3a24" stroke-width="3"/>
  <!-- Inner drum ring -->
  <circle cx="96" cy="96" r="56" fill="none" stroke="#2a5a38" stroke-width="1.5"/>
  <!-- Radial lines (drum strings) -->
  <line x1="96" y1="24" x2="96" y2="168" stroke="#2a5a38" stroke-width="1.5"/>
  <line x1="24" y1="96" x2="168" y2="96" stroke="#2a5a38" stroke-width="1.5"/>
  <line x1="45" y1="45" x2="147" y2="147" stroke="#2a5a38" stroke-width="1.5"/>
  <line x1="147" y1="45" x2="45" y2="147" stroke="#2a5a38" stroke-width="1.5"/>
  <!-- Subtle diagonal secondaries -->
  <line x1="30" y1="62" x2="162" y2="130" stroke="#1c3a24" stroke-width="1"/>
  <line x1="62" y1="30" x2="130" y2="162" stroke="#1c3a24" stroke-width="1"/>
  <line x1="162" y1="62" x2="30" y2="130" stroke="#1c3a24" stroke-width="1"/>
  <line x1="130" y1="30" x2="62" y2="162" stroke="#1c3a24" stroke-width="1"/>
  <!-- L letterform — centred -->
  <text
    x="96" y="116"
    font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif"
    font-size="72"
    font-weight="700"
    fill="#e8a93a"
    text-anchor="middle"
    dominant-baseline="auto"
    letter-spacing="-2"
  >L</text>
  <!-- Centre dot accent -->
  <circle cx="96" cy="96" r="5" fill="#e8a93a" opacity="0.35"/>
</svg>
