<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0d1f14"/>
  <!-- Outer drum ring -->
  <circle cx="256" cy="256" r="192" fill="none" stroke="#1c3a24" stroke-width="6"/>
  <!-- Inner drum ring -->
  <circle cx="256" cy="256" r="148" fill="none" stroke="#2a5a38" stroke-width="3"/>
  <!-- Radial lines (drum strings) -->
  <line x1="256" y1="64"  x2="256" y2="448" stroke="#2a5a38" stroke-width="3"/>
  <line x1="64"  y1="256" x2="448" y2="256" stroke="#2a5a38" stroke-width="3"/>
  <line x1="120" y1="120" x2="392" y2="392" stroke="#2a5a38" stroke-width="3"/>
  <line x1="392" y1="120" x2="120" y2="392" stroke="#2a5a38" stroke-width="3"/>
  <!-- Subtle diagonal secondaries -->
  <line x1="80"  y1="166" x2="432" y2="346" stroke="#1c3a24" stroke-width="2"/>
  <line x1="166" y1="80"  x2="346" y2="432" stroke="#1c3a24" stroke-width="2"/>
  <line x1="432" y1="166" x2="80"  y2="346" stroke="#1c3a24" stroke-width="2"/>
  <line x1="346" y1="80"  x2="166" y2="432" stroke="#1c3a24" stroke-width="2"/>
  <!-- L letterform — centred -->
  <text
    x="256" y="310"
    font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif"
    font-size="192"
    font-weight="700"
    fill="#e8a93a"
    text-anchor="middle"
    dominant-baseline="auto"
    letter-spacing="-4"
  >L</text>
  <!-- Centre dot accent -->
  <circle cx="256" cy="256" r="13" fill="#e8a93a" opacity="0.35"/>
</svg>
